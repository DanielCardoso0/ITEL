<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portal do Aluno</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Portal do Aluno</h2>
            <form>
                <label for="processo">Nº de Processo</label>
                <input type="text" id="processo" placeholder="Digite o nº de processo" required>

                <label for="password">Palavra-passe</label>
                <input type="password" id="password" placeholder="Digite a palavra-passe" required>

                <button type="submit" class="btn-primary">Entrar</button>
            </form>
            <p class="login-footer">Esqueceu a palavra-passe? <a href="#">Recuperar</a></p>
        </div>
    </div>
</body>
</html>
